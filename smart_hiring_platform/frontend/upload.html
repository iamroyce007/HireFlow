<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply — HireFlow</title>
    <meta name="description" content="Submit your application through HireFlow's AI-powered recruitment pipeline">
    <link rel="stylesheet" href="./styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const API = 'http://localhost:8000';

        const CandidatePortal = () => {
            const [file, setFile] = useState(null);
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [githubUrl, setGithubUrl] = useState('');
            const [linkedinUrl, setLinkedinUrl] = useState('');
            const [status, setStatus] = useState('idle');
            const [result, setResult] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [dragOver, setDragOver] = useState(false);
            const [githubData, setGithubData] = useState(null);
            const [verifyingGithub, setVerifyingGithub] = useState(false);
            const [company, setCompany] = useState('');
            const [detectedLinks, setDetectedLinks] = useState({ github: null, linkedin: null });

            const COMPANIES = ['Google', 'Amazon', 'Meta', 'Microsoft', 'Netflix', 'HireFlow HQ'];

            const extractLinks = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch(`${API}/api/candidates/extract-links`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    setDetectedLinks({ github: data.github, linkedin: data.linkedin });
                } catch (e) {
                    console.error('Link extraction failed:', e);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!file) return;

                setStatus('uploading');
                setErrorMsg('');

                const formData = new FormData();
                formData.append('resume', file);
                formData.append('name', name);
                formData.append('email', email);
                formData.append('github_url', githubUrl);
                formData.append('linkedin_url', linkedinUrl);
                formData.append('company', company);

                try {
                    const res = await fetch(`${API}/api/candidates/apply`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if (data.error) {
                        setErrorMsg(data.error);
                        setStatus('error');
                        return;
                    }

                    setResult(data.data);
                    setStatus('success');
                } catch (err) {
                    setErrorMsg('Cannot connect to backend. Ensure the server is running on port 8000.');
                    setStatus('error');
                }
            };

            const reset = () => {
                setFile(null);
                setName('');
                setEmail('');
                setGithubUrl('');
                setLinkedinUrl('');
                setStatus('idle');
                setResult(null);
                setErrorMsg('');
                setGithubData(null);
                setCompany('');
            };

            const handleVerifyGithub = async () => {
                if (!githubUrl || !githubUrl.includes('github.com')) return;
                setVerifyingGithub(true);
                try {
                    const res = await fetch(`${API}/api/candidates/verify-github?url=${encodeURIComponent(githubUrl)}`);
                    const data = await res.json();
                    setGithubData(data);
                } catch (e) {
                    console.error(e);
                    alert('Failed to verify GitHub profile.');
                }
                setVerifyingGithub(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const droppedFile = e.dataTransfer.files[0];
                if (droppedFile && droppedFile.type === 'application/pdf') {
                    setFile(droppedFile);
                    extractLinks(droppedFile);
                }
            };

            return (
                <div className="centered-layout">
                    <div className="form-card">
                        {/* Header */}
                        <div style={{marginBottom:'32px',textAlign:'center'}}>
                            <div style={{display:'inline-flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style={{color:'var(--brand-primary-light)'}}>
                                    <path d="M4 4H10L12 6H20V20H4V4Z" fill="currentColor" fillOpacity="0.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                </svg>
                                <span className="brand-name" style={{fontSize:'1.2rem'}}>HireFlow</span>
                            </div>
                            <h1 style={{fontSize:'1.5rem',fontWeight:800,letterSpacing:'-0.5px',marginBottom:'8px'}}>
                                Submit Your Application
                            </h1>
                            <p style={{color:'var(--text-secondary)',fontSize:'0.88rem',lineHeight:'1.5',maxWidth:'420px',margin:'0 auto'}}>
                                Upload your resume and our AI will analyze your profile automatically using HireAI.
                            </p>
                        </div>

                        {status === 'success' && result ? (
                            <div className="success-panel" style={{animation:'fadeIn 0.3s ease'}}>
                                <h3>✅ Application Submitted!</h3>
                                <p style={{color:'var(--text-secondary)',marginBottom:'20px',fontSize:'0.88rem'}}>
                                    Your resume has been analyzed by AI. Here's what we found:
                                </p>
                                <div className="parsed-data">
                                    <div><strong>Name:</strong> {result.name}</div>
                                    <div><strong>Email:</strong> {result.email}</div>
                                    <div><strong>Experience:</strong> {result.experience} years</div>
                                    <div><strong>AI Resume Score:</strong> <span style={{color:'var(--emerald)',fontWeight:700}}>{result.computed_score}%</span></div>
                                    {result.strengths && result.strengths.length > 0 && (
                                        <div style={{marginTop:'10px'}}>
                                            <strong>Key Strengths:</strong>
                                            <ul style={{marginLeft:'18px',marginTop:'4px',color:'var(--text-secondary)',lineHeight:'1.8'}}>
                                                {result.strengths.map((s, i) => <li key={i}>{s}</li>)}
                                            </ul>
                                        </div>
                                    )}
                                    <div style={{marginTop:'12px'}}>
                                        <strong>Skills Detected:</strong>
                                        <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'8px'}}>
                                            {result.skills && result.skills.map(s => (
                                                <span key={s} className="skill-badge">{s}</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                {result.computed_score >= 60 ? (
                                    <div style={{marginTop:'24px',padding:'16px',background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:'var(--radius-md)'}}>
                                        <div style={{fontSize:'0.85rem',fontWeight:700,color:'var(--emerald)',marginBottom:'8px'}}>
                                            🎉 Congratulations! You've qualified for the AI Interview round.
                                        </div>
                                        <div style={{fontSize:'0.78rem',color:'var(--text-secondary)',marginBottom:'16px'}}>
                                            Your score of {result.computed_score}% meets our threshold of 60%. Click below to begin your proctored interview.
                                        </div>
                                        <a href="./interview.html" className="btn btn-primary" style={{width:'100%',textDecoration:'none',textAlign:'center',padding:'14px',fontSize:'0.95rem'}}>
                                            🚀 Proceed to AI Interview
                                        </a>
                                    </div>
                                ) : (
                                    <div style={{marginTop:'24px',padding:'16px',background:'rgba(244,63,94,0.08)',border:'1px solid rgba(244,63,94,0.2)',borderRadius:'var(--radius-md)'}}>
                                        <div style={{fontSize:'0.85rem',fontWeight:700,color:'var(--rose)',marginBottom:'8px'}}>
                                            Score Below Threshold
                                        </div>
                                        <div style={{fontSize:'0.78rem',color:'var(--text-secondary)'}}>
                                            Your score of {result.computed_score}% is below the 60% threshold required for the interview round. Consider updating your resume and reapplying.
                                        </div>
                                    </div>
                                )}
                                <div style={{display:'flex',gap:'12px',marginTop:'16px'}}>
                                    <button className="btn btn-outline" onClick={reset} style={{flex:1}}>Submit Another</button>
                                    <a href="./index.html" className="btn btn-outline" style={{flex:1,textDecoration:'none',textAlign:'center'}}>
                                        View Dashboard →
                                    </a>
                                </div>
                            </div>
                        ) : (
                            <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
                                    <div className="form-group">
                                        <label className="form-label">
                                            Full Name <span className="form-label-hint">(optional — AI will extract)</span>
                                        </label>
                                        <input type="text" className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="Jane Doe" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">
                                            Email <span className="form-label-hint">(optional — AI will extract)</span>
                                        </label>
                                        <input type="email" className="form-input" value={email} onChange={e => setEmail(e.target.value)} placeholder="jane@example.com" />
                                    </div>
                                </div>

                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
                                    <div className="form-group">
                                        <label className="form-label" style={{display:'flex', justifyContent:'space-between', alignItems: 'center'}}>
                                            <span>GitHub Profile</span>
                                            {detectedLinks.github && !githubUrl && (
                                                <button 
                                                    type="button" 
                                                    onClick={() => setGithubUrl(detectedLinks.github)}
                                                    style={{background:'none', border:'none', color:'var(--brand-primary-light)', fontSize:'0.7rem', cursor:'pointer', padding:0, fontWeight: 700}}
                                                >
                                                    📝 Paste from resume
                                                </button>
                                            )}
                                            {githubUrl && !githubData && <span style={{fontSize:'0.65rem', color:'var(--amber)'}}>⚠️ Not Verified</span>}
                                        </label>
                                        <div style={{display:'flex',gap:'10px'}}>
                                            <input type="url" className="form-input" value={githubUrl} onChange={e => setGithubUrl(e.target.value)} placeholder="https://github.com/username" />
                                            <button 
                                                type="button" 
                                                className="btn btn-outline btn-sm" 
                                                style={{height:'40px',whiteSpace:'nowrap'}}
                                                onClick={handleVerifyGithub}
                                                disabled={verifyingGithub || !githubUrl}
                                            >
                                                {verifyingGithub ? '⏳' : '🔍 Verify'}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label" style={{display:'flex', justifyContent:'space-between', alignItems: 'center'}}>
                                            <span>LinkedIn Profile</span>
                                            {detectedLinks.linkedin && !linkedinUrl && (
                                                <button 
                                                    type="button" 
                                                    onClick={() => setLinkedinUrl(detectedLinks.linkedin)}
                                                    style={{background:'none', border:'none', color:'var(--brand-primary-light)', fontSize:'0.7rem', cursor:'pointer', padding:0, fontWeight: 700}}
                                                >
                                                    📝 Paste from resume
                                                </button>
                                            )}
                                        </label>
                                        <input type="url" className="form-input" value={linkedinUrl} onChange={e => setLinkedinUrl(e.target.value)} placeholder="https://linkedin.com/in/username" />
                                    </div>
                                </div>

                                <div className="form-group" style={{marginTop:'16px'}}>
                                    <label className="form-label">Company to Apply For</label>
                                    <select 
                                        className="form-select" 
                                        value={company} 
                                        onChange={e => setCompany(e.target.value)}
                                        required
                                        style={{appearance:'none', cursor:'pointer'}}
                                    >
                                        <option value="" disabled>Select a Company</option>
                                        {COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                    {githubData && githubData.score > 0 && (
                                        <div style={{marginBottom:'20px',padding:'16px',background:'rgba(245,158,11,0.05)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'var(--radius-md)'}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                                                <div style={{fontSize:'0.85rem',fontWeight:700,color:'#fbbf24'}}>🐙 GitHub Insights</div>
                                                <div style={{fontSize:'0.7rem',fontWeight:600,background:'#fbbf2422',color:'#fbbf24',padding:'2px 8px',borderRadius:'10px'}}>Score: {githubData.score}/100</div>
                                            </div>
                                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'12px'}}>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>⭐</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.total_stars}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Stars</div>
                                                </div>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>📁</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.repo_count}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Repos</div>
                                                </div>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>👥</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.followers}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Followers</div>
                                                </div>
                                            </div>
                                            {githubData.top_repos && githubData.top_repos.length > 0 && (
                                                <div>
                                                    <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                                                        {githubData.top_repos.slice(0, 3).map((r, i) => (
                                                            <div key={i} style={{fontSize:'0.72rem',display:'flex',justifyContent:'space-between',background:'rgba(255,255,255,0.03)',padding:'4px 8px',borderRadius:'4px'}}>
                                                                <span style={{color:'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🔗 {r.name}</span>
                                                                <span style={{color:'var(--amber)',flexShrink:0}}>{r.name} ⭐</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                <div className="form-group">
                                    <label className="form-label">Resume (PDF) <span style={{color:'var(--rose)'}}>*</span></label>
                                    <div
                                        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                                        onDragLeave={() => setDragOver(false)}
                                        onDrop={handleDrop}
                                        style={{
                                            border: `2px dashed ${dragOver ? 'var(--brand-primary)' : 'var(--glass-border)'}`,
                                            borderRadius: 'var(--radius-md)',
                                            padding: '28px',
                                            textAlign: 'center',
                                            background: dragOver ? 'rgba(99,102,241,0.05)' : 'rgba(0,0,0,0.15)',
                                            transition: 'all 0.2s ease',
                                            cursor: 'pointer'
                                        }}
                                        onClick={() => document.getElementById('file-input').click()}
                                    >
                                        <input
                                            id="file-input"
                                            type="file"
                                            accept=".pdf"
                                            style={{display:'none'}}
                                            onChange={e => {
                                                const selectedFile = e.target.files[0];
                                                if (selectedFile) {
                                                    setFile(selectedFile);
                                                    extractLinks(selectedFile);
                                                }
                                            }}
                                            required
                                        />
                                        {file ? (
                                            <div>
                                                <div style={{fontSize:'1.5rem',marginBottom:'6px'}}>📄</div>
                                                <div style={{color:'var(--text-primary)',fontWeight:600,fontSize:'0.9rem'}}>{file.name}</div>
                                                <div style={{color:'var(--text-muted)',fontSize:'0.75rem',marginTop:'4px'}}>
                                                    {(file.size / 1024).toFixed(1)} KB — Click to change
                                                </div>
                                            </div>
                                        ) : (
                                            <div>
                                                <div style={{fontSize:'2rem',marginBottom:'8px',opacity:0.5}}>📤</div>
                                                <div style={{color:'var(--text-secondary)',fontSize:'0.88rem'}}>
                                                    Drop your PDF here or <span style={{color:'var(--brand-primary-light)',fontWeight:600}}>browse</span>
                                                </div>
                                                <div style={{color:'var(--text-muted)',fontSize:'0.75rem',marginTop:'4px'}}>
                                                    PDF files only • Max 10MB
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    className="btn btn-primary"
                                    disabled={status === 'uploading' || !file}
                                    style={{marginTop:'8px',padding:'14px',fontSize:'0.95rem'}}
                                >
                                    {status === 'uploading'
                                        ? <><span className="spinner" style={{width:18,height:18,borderWidth:2}}></span> HireAI is Analyzing Your Resume...</>
                                        : '🚀 Submit Application'
                                    }
                                </button>

                                {status === 'error' && (
                                    <div className="red-flag-box" style={{marginTop:'14px'}}>
                                        <span>⚠️</span>
                                        <span>{errorMsg}</span>
                                    </div>
                                )}
                            </form>
                        )}

                        <div style={{marginTop:'28px',textAlign:'center',borderTop:'1px solid var(--glass-border)',paddingTop:'20px'}}>
                            <a href="./index.html" style={{color:'var(--brand-primary-light)',textDecoration:'none',fontSize:'0.85rem',fontWeight:500}}>
                                ← Back to Dashboard
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CandidatePortal />);
    </script>
</body>
</html>
