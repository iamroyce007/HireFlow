<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Login — HireFlow</title>
    <link rel="stylesheet" href="./styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }
        .login-logo-img {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 20px rgba(245,158,11,0.2));
            cursor: pointer;
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 12px;
            outline: none;
        }
        .login-input:focus { border-color: var(--brand-primary); }
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            transition: all 0.2s;
        }
        .login-btn:hover {
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
            transform: translateY(-1px);
        }
        .back-link {
            margin-top: 24px;
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text-secondary); }
        .error { color: var(--rose); font-size: 0.75rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="glow-orb"></div>
    </div>
    <div id="root">
        <div class="login-container" style="opacity: 0.5; pointer-events: none;">
            <div class="login-card loading-pulse">
                <div style="height: 60px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border-radius: 10px;"></div>
                <div style="height: 30px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; width: 60%; margin-left: 20%;"></div>
                <div style="height: 15px; margin-bottom: 30px; background: rgba(255,255,255,0.05); border-radius: 4px; width: 40%; margin-left: 30%;"></div>
                <div style="height: 40px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border-radius: 6px;"></div>
                <div style="height: 40px; background: rgba(16,185,129,0.1); border-radius: 6px;"></div>
                <p style="margin-top: 20px; color: var(--text-muted); font-size: 0.8rem;">Initializing interface...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState } = React;

        const CandidateLogin = () => {
            const [email, setEmail] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (!email.trim() || !email.includes('@')) {
                    setError('Please enter a valid email');
                    return;
                }
                localStorage.setItem('hireflow_user', JSON.stringify({
                    role: 'candidate', email: email.trim()
                }));
                window.location.href = 'upload.html';
            };

            return (
                <div className="login-container">
                    <div className="login-card">
                        <img src="./banner.png" alt="HireFlow" style={{width:'100%',maxWidth:260,marginBottom:20,cursor:'pointer'}} onClick={() => window.location.href='login.html'} />
                        <h1 className="login-title">Candidate Login</h1>
                        <p className="login-subtitle">Enter your email to access your dashboard</p>
                        
                        <form onSubmit={handleLogin}>
                            {error && <div className="error">{error}</div>}
                            <input
                                className="login-input"
                                type="email"
                                placeholder="name@example.com"
                                value={email}
                                onChange={e => { setEmail(e.target.value); setError(''); }}
                                autoFocus
                            />
                            <button type="submit" className="login-btn">
                                Open Dashboard →
                            </button>
                        </form>
                        
                        <a href="login.html" className="back-link">← Back to role selection</a>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CandidateLogin />);
    </script>
</body>
</html>
