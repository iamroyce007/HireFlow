<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Dashboard — HireFlow</title>
    <meta name="description" content="HireFlow Candidate Dashboard: Track your application, take AI interviews, and monitor your hiring status.">
    <link rel="stylesheet" href="./styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .cand-layout { position: relative; z-index: 1; min-height: 100vh; padding: 20px; max-width: 900px; margin: 0 auto; }
        .cand-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding: 16px 24px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: blur(20px); }
        .cand-header-left { display: flex; align-items: center; gap: 14px; }
        .cand-header-logo { width: 38px; height: 38px; border-radius: 10px; background: var(--brand-gradient); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .cand-header h1 { font-size: 1.15rem; font-weight: 700; }
        .cand-header h1 span { color: var(--brand-primary-light); }
        .cand-user-badge { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text-secondary); }
        .cand-logout { background: none; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 6px 14px; border-radius: var(--radius-sm); font-size: 0.72rem; font-family: inherit; cursor: pointer; transition: all var(--t-fast); }
        .cand-logout:hover { border-color: var(--rose); color: var(--rose); }

        /* Accordion */
        .accordion { margin-bottom: 16px; }
        .accordion-section { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; transition: all var(--t-normal); backdrop-filter: blur(20px); }
        .accordion-section:hover { border-color: var(--glass-border-hover); }
        .accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; cursor: pointer; user-select: none; }
        .accordion-header:hover { background: rgba(255,255,255,0.02); }
        .accordion-header-left { display: flex; align-items: center; gap: 12px; }
        .accordion-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .accordion-title { font-size: 0.95rem; font-weight: 700; }
        .accordion-badge { font-size: 0.68rem; padding: 3px 10px; border-radius: var(--radius-full); font-weight: 600; }
        .accordion-arrow { font-size: 0.8rem; color: var(--text-muted); transition: transform var(--t-normal); }
        .accordion-arrow.open { transform: rotate(180deg); }
        .accordion-body { padding: 0 24px 24px; }
        .accordion-body.collapsed { display: none; }

        /* Form elements */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04); color: var(--text-primary); font-size: 0.82rem; font-family: inherit; outline: none; transition: border var(--t-fast); }
        .form-input:focus, .form-select:focus { border-color: var(--brand-primary); }
        .form-select option { background: #1a1f2e; color: var(--text-primary); }

        /* File upload */
        .file-drop { border: 2px dashed var(--glass-border); border-radius: var(--radius-md); padding: 32px; text-align: center; cursor: pointer; transition: all var(--t-fast); }
        .file-drop:hover, .file-drop.active { border-color: var(--brand-primary); background: rgba(245,158,11,0.04); }
        .file-drop-icon { font-size: 2rem; margin-bottom: 8px; }
        .file-drop-text { font-size: 0.8rem; color: var(--text-secondary); }
        .file-drop-name { font-size: 0.78rem; color: var(--emerald); font-weight: 600; margin-top: 6px; }

        /* Score display */
        .score-display { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: var(--radius-md); margin-top: 14px; }
        .score-display.pass { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); }
        .score-display.fail { background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.2); }
        .score-big { font-size: 2rem; font-weight: 800; }
        .score-big.pass { color: var(--emerald); }
        .score-big.fail { color: var(--rose); }

        /* Profile grid */
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .profile-item { padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.04); }
        .profile-item-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .profile-item-value { font-size: 0.88rem; font-weight: 600; }

        /* Skills */
        .skills-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .skill-tag { padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 600; background: rgba(245,158,11,0.08); color: #fbbf24; border: 1px solid rgba(245,158,11,0.18); }

        /* Interview */
        .interview-question { padding: 20px; background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: var(--radius-md); margin-bottom: 14px; }
        .interview-q-num { font-size: 0.68rem; color: #a78bfa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .interview-q-text { font-size: 0.92rem; line-height: 1.6; }
        .interview-controls { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
        .interview-btn { padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.8rem; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all var(--t-fast); }
        .btn-speak { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
        .btn-speak:hover { background: rgba(59,130,246,0.2); }
        .btn-record { background: rgba(244,63,94,0.12); color: #f87171; border: 1px solid rgba(244,63,94,0.25); }
        .btn-record:hover { background: rgba(244,63,94,0.2); }
        .btn-record.recording { background: rgba(244,63,94,0.3); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
        .btn-submit-answer { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-submit-answer:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
        .transcript-box { margin-top: 12px; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); font-size: 0.8rem; color: var(--text-secondary); min-height: 60px; font-style: italic; }
        .tab-warning { padding: 12px 18px; background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); border-radius: var(--radius-sm); color: #f87171; font-size: 0.78rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .video-preview { width: 100%; max-width: 400px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); margin-top: 12px; background: #000; }

        /* Alerts timeline */
        .alerts-timeline { position: relative; padding-left: 24px; }
        .alerts-timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--glass-border); }
        .alert-item { position: relative; margin-bottom: 16px; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); }
        .alert-item::before { content: ''; position: absolute; left: -20px; top: 18px; width: 10px; height: 10px; border-radius: 50%; }
        .alert-item.success::before { background: var(--emerald); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
        .alert-item.warning::before { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.4); }
        .alert-item.error::before { background: var(--rose); box-shadow: 0 0 8px rgba(244,63,94,0.4); }
        .alert-item.info::before { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.4); }
        .alert-title { font-size: 0.82rem; font-weight: 700; margin-bottom: 3px; }
        .alert-desc { font-size: 0.72rem; color: var(--text-muted); }
        .alert-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; }

        /* Action buttons */
        .action-btn-primary { padding: 12px 28px; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.85rem; font-family: inherit; cursor: pointer; transition: all var(--t-fast); }
        .action-btn-primary.green { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .action-btn-primary.green:hover { box-shadow: 0 4px 20px rgba(16,185,129,0.3); transform: translateY(-1px); }
        .action-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-state-text { font-size: 0.85rem; }
        .progress-steps { display: flex; gap: 0; margin-bottom: 20px; }
        .progress-step { flex: 1; text-align: center; padding: 10px; font-size: 0.7rem; font-weight: 600; border-bottom: 3px solid var(--glass-border); color: var(--text-muted); transition: all var(--t-fast); }
        .progress-step.active { border-color: var(--brand-primary); color: var(--brand-primary-light); }
        .progress-step.done { border-color: var(--emerald); color: var(--emerald); }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API = 'http://localhost:8000';

        /* ─── Accordion Section ─── */
        const AccordionSection = ({ icon, iconBg, title, badge, badgeColor, defaultOpen, children, visible = true }) => {
            const [open, setOpen] = useState(defaultOpen || false);
            if (!visible) return null;
            return (
                <div className="accordion-section">
                    <div className="accordion-header" onClick={() => setOpen(!open)}>
                        <div className="accordion-header-left">
                            <div className="accordion-icon" style={{ background: iconBg }}>{icon}</div>
                            <span className="accordion-title">{title}</span>
                            {badge && <span className="accordion-badge" style={{ background: badgeColor + '18', color: badgeColor, border: `1px solid ${badgeColor}30` }}>{badge}</span>}
                        </div>
                        <span className={`accordion-arrow ${open ? 'open' : ''}`}>▼</span>
                    </div>
                    <div className={`accordion-body ${open ? '' : 'collapsed'}`}>{children}</div>
                </div>
            );
        };

        /* ─── Main App ─── */
        const CandidateDashboard = () => {
            const [user, setUser] = useState(null);
            const [candidate, setCandidate] = useState(null);
            const [candidates, setCandidates] = useState([]);
            const [file, setFile] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [uploadResult, setUploadResult] = useState(null);
            const [evaluating, setEvaluating] = useState(false);
            const [dragOver, setDragOver] = useState(false);
            const [githubUrl, setGithubUrl] = useState('');
            const [linkedinUrl, setLinkedinUrl] = useState('');
            const [githubData, setGithubData] = useState(null);
            const [verifyingGithub, setVerifyingGithub] = useState(false);
            const [company, setCompany] = useState('');

            const COMPANIES = ['Google', 'Amazon', 'Meta', 'Microsoft', 'Netflix', 'HireFlow HQ'];

            const THRESHOLD = 60;

            useEffect(() => {
                const stored = localStorage.getItem('hireflow_user');
                if (!stored) { window.location.href = 'login.html'; return; }
                const u = JSON.parse(stored);
                if (u.role !== 'candidate') { window.location.href = 'login.html'; return; }
                setUser(u);
                loadCandidates(u.email);
            }, []);



            const loadCandidates = async (email) => {
                try {
                    const res = await fetch(`${API}/api/candidates`);
                    const data = await res.json();
                    const mine = (data.candidates || []).filter(c =>
                        c.email && c.email.toLowerCase() === email.toLowerCase()
                    );
                    setCandidates(mine);
                    if (mine.length > 0) setCandidate(mine[mine.length - 1]);
                } catch (e) { console.error(e); }
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!file || !user) return;
                setUploading(true);
                const fd = new FormData();
                fd.append('resume', file);
                fd.append('name', user.email.split('@')[0]);
                fd.append('email', user.email);
                fd.append('github_url', githubUrl);
                fd.append('linkedin_url', linkedinUrl);
                fd.append('company', company);
                try {
                    const res = await fetch(`${API}/api/candidates/apply`, { method: 'POST', body: fd });
                    const data = await res.json();
                    setUploadResult(data);
                    loadCandidates(user.email);
                } catch (err) {
                    setUploadResult({ error: err.message });
                }
                setUploading(false);
            };

            const handleVerifyGithub = async () => {
                if (!githubUrl || !githubUrl.includes('github.com')) return;
                setVerifyingGithub(true);
                try {
                    const res = await fetch(`${API}/api/candidates/verify-github?url=${encodeURIComponent(githubUrl)}`);
                    const data = await res.json();
                    setGithubData(data);
                } catch (e) {
                    console.error(e);
                    alert('Failed to verify GitHub profile.');
                }
                setVerifyingGithub(false);
            };

            const handleDeepEval = async () => {
                if (!candidate) return;
                setEvaluating(true);
                try {
                    const res = await fetch(`${API}/api/interviews/evaluate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ candidate_id: candidate.id })
                    });
                    await res.json();
                    loadCandidates(user.email);
                } catch (e) { console.error(e); }
                setEvaluating(false);
            };



            const logout = () => {
                localStorage.removeItem('hireflow_user');
                window.location.href = 'login.html';
            };

            if (!user) return null;

            const baseScore = candidate?.baselineScore || 0;
            const qualified = baseScore >= THRESHOLD;
            const isEvaluated = candidate?.evaluated;

            const alerts = [];
            if (candidate) {
                alerts.push({ type: 'info', title: 'Application Submitted', desc: 'Your resume has been received and is being processed.', time: candidate.applied_at });
                if (baseScore >= THRESHOLD) alerts.push({ type: 'success', title: 'Resume Shortlisted', desc: `Your resume scored ${baseScore}/100 — you qualify for an AI interview!`, time: '' });
                else if (baseScore > 0) alerts.push({ type: 'error', title: 'Below Threshold', desc: `Resume scored ${baseScore}/100 — below the ${THRESHOLD} threshold.`, time: '' });
                if (isEvaluated) alerts.push({ type: 'success', title: 'Deep Evaluation Complete', desc: `Composite score: ${candidate.metrics?.composite_score || 'N/A'}/100`, time: candidate.evaluated_at });

            }

            return (
                <div className="cand-layout">
                    <div className="cand-header">
                        <div className="cand-header-left">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style={{color:'var(--brand-primary-light)'}}>
                                <path d="M4 4H10L12 6H20V20H4V4Z" fill="currentColor" fillOpacity="0.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            <h1>Hire<span>Flow</span></h1>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
                            <div className="cand-user-badge">👤 {user.email}</div>
                            <button className="cand-logout" onClick={logout}>Logout</button>
                        </div>
                    </div>

                    {/* Progress Steps */}
                    {candidate && (
                        <div className="progress-steps">
                            <div className={`progress-step ${candidate ? 'done' : ''}`}>📄 Applied</div>
                            <div className={`progress-step ${baseScore > 0 ? (qualified ? 'done' : 'active') : ''}`}>📊 Screened</div>
                            <div className={`progress-step ${isEvaluated ? 'done' : (qualified ? 'active' : '')}`}>🎤 Interview</div>
                            <div className={`progress-step ${isEvaluated ? 'done' : ''}`}>✅ Evaluated</div>
                        </div>
                    )}

                    <div className="accordion">
                        {/* Section 1: Profile */}
                        <AccordionSection icon="👤" iconBg="rgba(59,130,246,0.12)" title="My Profile" badge={candidate ? candidate.status : 'New'} badgeColor={isEvaluated ? '#10b981' : '#f59e0b'} defaultOpen={true}>
                            {candidate ? (
                                <div>
                                    <div className="profile-grid">
                                        <div className="profile-item">
                                            <div className="profile-item-label">Name</div>
                                            <div className="profile-item-value">{candidate.name}</div>
                                        </div>
                                        <div className="profile-item">
                                            <div className="profile-item-label">Email</div>
                                            <div className="profile-item-value">{candidate.email}</div>
                                        </div>
                                        <div className="profile-item">
                                            <div className="profile-item-label">Experience</div>
                                            <div className="profile-item-value">{candidate.years_experience} years</div>
                                        </div>
                                        <div className="profile-item">
                                            <div className="profile-item-label">GitHub</div>
                                            <div className="profile-item-value" style={{fontSize:'0.75rem', overflow:'hidden', textOverflow:'ellipsis'}}>
                                                {candidate.github_url ? <a href={candidate.github_url} target="_blank" style={{color:'var(--brand-primary-light)'}}>{candidate.github_url.split('github.com/')[1]}</a> : 'None'}
                                            </div>
                                        </div>
                                        <div className="profile-item">
                                            <div className="profile-item-label">Resume Score</div>
                                            <div className="profile-item-value" style={{color: baseScore >= THRESHOLD ? '#10b981' : '#f59e0b'}}>{baseScore}/100</div>
                                        </div>
                                    </div>
                                    {candidate.skills && candidate.skills.length > 0 && (
                                        <div>
                                            <div className="form-label" style={{marginTop:'14px'}}>Skills</div>
                                            <div className="skills-row">
                                                {candidate.skills.map((s, i) => <span key={i} className="skill-tag">{s}</span>)}
                                            </div>
                                        </div>
                                    )}
                                    {candidate.summary && (
                                        <div style={{marginTop:'14px',fontSize:'0.8rem',color:'var(--text-secondary)',lineHeight:'1.6'}}>
                                            <div className="form-label">AI Summary</div>
                                            {candidate.ai_summary || candidate.summary}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="empty-state">
                                    <div className="empty-state-icon">📄</div>
                                    <div className="empty-state-text">Upload your resume to create your profile</div>
                                </div>
                            )}
                        </AccordionSection>

                        {/* Section 2: Application */}
                        <AccordionSection icon="📋" iconBg="rgba(245,158,11,0.12)" title="Application" badge={candidate ? 'Submitted' : 'Pending'} badgeColor={candidate ? '#10b981' : '#f59e0b'} defaultOpen={!candidate}>
                            {!candidate ? (
                                <form onSubmit={handleUpload}>
                                    <div className="form-group" style={{marginBottom:'20px'}}>
                                        <label className="form-label">GitHub Profile URL</label>
                                        <div style={{display:'flex',gap:'10px'}}>
                                            <input 
                                                type="url" 
                                                className="form-input" 
                                                placeholder="https://github.com/username"
                                                value={githubUrl}
                                                onChange={e => setGithubUrl(e.target.value)}
                                            />
                                            <button 
                                                type="button" 
                                                className="interview-btn btn-speak" 
                                                style={{flexShrink:0}}
                                                onClick={handleVerifyGithub}
                                                disabled={verifyingGithub || !githubUrl}
                                            >
                                                {verifyingGithub ? '⏳...' : '🔍 Verify'}
                                            </button>
                                        </div>
                                    </div>

                                    <div className="form-group" style={{marginBottom:'20px'}}>
                                        <label className="form-label">LinkedIn Profile URL</label>
                                        <input 
                                            type="url" 
                                            className="form-input" 
                                            placeholder="https://linkedin.com/in/username"
                                            value={linkedinUrl}
                                            onChange={e => setLinkedinUrl(e.target.value)}
                                        />
                                    </div>

                                    <div className="form-group" style={{marginBottom:'20px'}}>
                                        <label className="form-label">Company to Apply For</label>
                                        <select 
                                            className="form-input" 
                                            value={company} 
                                            onChange={e => setCompany(e.target.value)}
                                            required
                                            style={{appearance:'none', cursor:'pointer'}}
                                        >
                                            <option value="" disabled>Select a Company</option>
                                            {COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>

                                    {githubData && githubData.score > 0 && (
                                        <div style={{marginBottom:'20px',padding:'16px',background:'rgba(245,158,11,0.05)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'var(--radius-md)'}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                                                <div style={{fontSize:'0.85rem',fontWeight:700,color:'#fbbf24'}}>🐙 GitHub Insights</div>
                                                <div style={{fontSize:'0.7rem',fontWeight:600,background:'#fbbf2422',color:'#fbbf24',padding:'2px 8px',borderRadius:'10px'}}>Score: {githubData.score}/100</div>
                                            </div>
                                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'12px'}}>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>⭐</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.total_stars}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Stars</div>
                                                </div>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>📁</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.repo_count}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Repos</div>
                                                </div>
                                                <div style={{textAlign:'center'}}>
                                                    <div style={{fontSize:'1rem'}}>👥</div>
                                                    <div style={{fontSize:'0.8rem',fontWeight:700}}>{githubData.followers}</div>
                                                    <div style={{fontSize:'0.6rem',color:'var(--text-muted)'}}>Followers</div>
                                                </div>
                                            </div>
                                            {githubData.top_repos && githubData.top_repos.length > 0 && (
                                                <div>
                                                    <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:'6px'}}>Top Projects</div>
                                                    <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                                                        {githubData.top_repos.slice(0, 3).map((r, i) => (
                                                            <div key={i} style={{fontSize:'0.72rem',display:'flex',justifyContent:'space-between',background:'rgba(255,255,255,0.03)',padding:'4px 8px',borderRadius:'4px'}}>
                                                                <span style={{color:'var(--text-secondary)'}}>🔗 {r.name}</span>
                                                                <span style={{color:'var(--amber)'}}>{r.stars} ⭐</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="form-label">Resume (PDF)</div>
                                    <div
                                        className={`file-drop ${dragOver ? 'active' : ''}`}
                                        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                                        onDragLeave={() => setDragOver(false)}
                                        onDrop={e => { e.preventDefault(); setDragOver(false); setFile(e.dataTransfer.files[0]); }}
                                        onClick={() => document.getElementById('file-input').click()}
                                    >
                                        <div className="file-drop-icon">📎</div>
                                        <div className="file-drop-text">Drop your resume here or click to browse</div>
                                        {file && <div className="file-drop-name">✓ {file.name}</div>}
                                        <input id="file-input" type="file" accept=".pdf,.doc,.docx" onChange={e => setFile(e.target.files[0])} style={{display:'none'}} />
                                    </div>
                                    <button type="submit" className="action-btn-primary green" style={{marginTop:'14px',width:'100%'}} disabled={!file || uploading}>
                                        {uploading ? '⏳ Analyzing Resume...' : '🚀 Submit Application'}
                                    </button>
                                    {uploadResult?.error && (
                                        <div style={{marginTop:'10px',color:'var(--rose)',fontSize:'0.8rem'}}>❌ {uploadResult.error}</div>
                                    )}
                                </form>
                            ) : (
                                <div>
                                    <div className={`score-display ${qualified ? 'pass' : 'fail'}`}>
                                        <div className={`score-big ${qualified ? 'pass' : 'fail'}`}>{baseScore}</div>
                                        <div>
                                            <div style={{fontWeight:700,fontSize:'0.9rem'}}>{qualified ? '✅ You Qualify!' : '❌ Below Threshold'}</div>
                                            <div style={{fontSize:'0.75rem',color:'var(--text-muted)',marginTop:'2px'}}>
                                                {qualified
                                                    ? `Score ≥ ${THRESHOLD} — You are eligible for the AI Interview round.`
                                                    : `Score is below ${THRESHOLD}. Your application has been noted, but you do not qualify for the interview round.`
                                                }
                                            </div>
                                        </div>
                                    </div>
                                    {qualified && !isEvaluated && (
                                        <button className="action-btn-primary green" style={{marginTop:'16px',width:'100%'}} onClick={handleDeepEval} disabled={evaluating}>
                                            {evaluating ? '⏳ Running Deep AI Evaluation...' : '🧠 Run Deep AI Evaluation'}
                                        </button>
                                    )}
                                </div>
                            )}
                        </AccordionSection>

                        {/* Section 3: AI Interview */}
                        <AccordionSection
                            icon="🎤"
                            iconBg="rgba(139,92,246,0.12)"
                            title="AI Interview"
                            badge={isEvaluated ? 'Completed' : (qualified ? 'Action Required' : 'Locked')}
                            badgeColor={isEvaluated ? '#10b981' : (qualified ? '#f59e0b' : '#64748b')}
                            defaultOpen={false}
                            visible={qualified}
                        >
                            <div style={{textAlign:'center',padding:'20px 0'}}>
                                <div style={{fontSize:'2.5rem',marginBottom:'12px'}}>🎥</div>
                                <div style={{fontSize:'0.9rem',fontWeight:600,marginBottom:'6px'}}>AI-Proctored Interview</div>
                                <div style={{fontSize:'0.78rem',color:'var(--text-muted)',marginBottom:'20px',maxWidth:'400px',margin:'0 auto 20px'}}>
                                    You have been shortlisted! Click below to start your comprehensive AI-proctored interview session. Make sure your webcam and microphone are working.
                                </div>
                                <a href={`interview.html`} className="action-btn-primary green" style={{display:'inline-block', textDecoration:'none'}}>
                                    🎬 Start Proctored Interview
                                </a>
                            </div>
                        </AccordionSection>

                        {/* Section 4: Alerts */}
                        <AccordionSection icon="🔔" iconBg="rgba(6,182,212,0.12)" title="Alerts & Notifications" badge={`${alerts.length}`} badgeColor="#06b6d4" defaultOpen={false}>
                            {alerts.length > 0 ? (
                                <div className="alerts-timeline">
                                    {alerts.map((a, i) => (
                                        <div key={i} className={`alert-item ${a.type}`}>
                                            <div className="alert-title">{a.title}</div>
                                            <div className="alert-desc">{a.desc}</div>
                                            {a.time && <div className="alert-time">{a.time}</div>}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="empty-state">
                                    <div className="empty-state-icon">🔕</div>
                                    <div className="empty-state-text">No alerts yet. Submit your application to get started.</div>
                                </div>
                            )}
                        </AccordionSection>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CandidateDashboard />);
    </script>
</body>
</html>
